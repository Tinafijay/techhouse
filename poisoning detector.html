<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tech House | Poisoning Detector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="poisoning detector styles.css">
</head>
<body>
    <div id="tour-overlay" aria-hidden="true">
        <h1 id="tour-title">Tech House Tour</h1>
        <p id="tour-desc"></p>
        <div class="tour-controls">
            <button class="main-btn" onclick="nextTourStep()">Next</button>
            <button class="main-btn" id="play-tour-btn" onclick="autoPlayTour()">Play Tour</button>
        </div>
        <button class="skip-btn" onclick="closeTour()">Skip</button>
    </div>

    <div class="app-container">
        <main id="panel-scan" class="tab-pane active" role="tabpanel">
            <div class="content-padding">
                <h2 class="brand-text">Precision Scanner</h2>
                <div class="viewport">
                    <video id="cam-feed" autoplay playsinline muted></video>
                </div>
                
                <button class="main-btn" onclick="processScan()">SCAN FOOD</button>
                
                <div class="flashlight-container">
                    <label for="flashlight-toggle" class="flashlight-label">
                        <input type="checkbox" id="flashlight-toggle" onchange="toggleFlash()">
                        <span>Flashlight Switch</span>
                    </label>
                </div>

                <div id="status-text" aria-live="polite">System Ready</div>
            </div>
        </main>

        <section id="panel-history" class="tab-pane" role="tabpanel" aria-hidden="true">
            <div class="content-padding">
                <h2 class="brand-text">Security Logs</h2>
                <div class="history-top-actions">
                    <button class="secondary-btn" onclick="generateFullReportPDF()">Download All PDF</button>
                    <button class="secondary-btn wipe-btn" onclick="clearAll()">Wipe</button>
                </div>
                <div id="history-list"></div>
            </div>
        </section>

        <section id="panel-settings" class="tab-pane" role="tabpanel" aria-hidden="true">
            <div class="content-padding">
                <h2 class="brand-text">Settings</h2>
                <div class="settings-card">
                    <label for="api-key">Gemini API Key</label>
                    <input type="password" id="api-key" class="input-field" placeholder="Paste Key Here">
                    
                    <button class="secondary-btn" style="width:100%; margin-bottom:15px;" onclick="testConnection()">Test Connection</button>

                    <hr>
                    <label>Preferences</label>
                    <div class="toggle-row">
                        <span>System Sounds</span>
                        <input type="checkbox" id="toggle-sound">
                    </div>
                    <div class="toggle-row">
                        <span>Haptic Vibration</span>
                        <input type="checkbox" id="toggle-vibe">
                    </div>

                    <hr>
                    <label for="theme-select">Interface Theme</label>
                    <select id="theme-select" class="input-field">
                        <option value="light">Tech House Light</option>
                        <option value="dark">Tech House Dark</option>
                        <option value="midnight">Midnight Pro</option>
                        <option value="cyberpunk">Cyberpunk Neon</option>
                    </select>
                    
                    <button class="main-btn" style="background: var(--primary); margin-top:20px;" onclick="saveAllSettings()">SAVE ALL SETTINGS</button>
                    <button class="main-btn tour-btn" style="background:#444;" onclick="startTour()">Revisit Tour</button>
                </div>
            </div>
        </section>

        <nav class="tab-bar" role="tablist">
            <button id="nav-scan" class="tab-btn active" role="tab" onclick="switchTab('panel-scan', this)">📷<br>SCAN</button>
            <button id="nav-history" class="tab-btn" role="tab" onclick="switchTab('panel-history', this)">📜<br>HISTORY</button>
            <button id="nav-settings" class="tab-btn" role="tab" onclick="switchTab('panel-settings', this)">⚙️<br>SETTINGS</button>
        </nav>
    </div>

    <script src="poisoning detector script.js"></script>
</body>
</html>
