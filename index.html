<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech House - Innovate. Create. Elevate.</title>
    <script src="coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Techhouse_style.css"> 
    <style>
        /* ADDING ONLY MODAL STYLES HERE TO KEEP EXTERNAL CSS CLEAN */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; color: var(--text-color); }
        .google-btn { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; color: #444; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-bottom: 20px; }
        .separator { margin: 20px 0; border-bottom: 1px solid #ddd; line-height: 0.1em; }
        .separator span { background: var(--card-bg); padding: 0 10px; color: #888; }
        #email-form input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; background: var(--bg-color); color: var(--text-color); }
        .name-row { display: flex; gap: 10px; }
        .password-container { position: relative; }
        #togglePassword { position: absolute; right: 10px; top: 12px; background: none; border: none; color: var(--primary-color); cursor: pointer; }
        .continue-btn { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: var(--card-bg); min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1; border-radius: 8px; }
        .dropdown-content a { color: var(--text-color); padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body data-theme="light"> <header>
        <nav>
            <div class="logo">
                <img src="Tech House logo.jpg" alt="Tech House Logo">
            </div>
            <div class="nav-right">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#apps">Apps</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
                
                <div id="auth-ui">
                    <button id="signin-btn" class="read-more-btn" style="margin:0; padding: 5px 15px;" onclick="openModal()">Sign In</button>
                    <div id="user-profile" style="display: none;" class="dropdown">
                        <button class="dropbtn" id="user-display-name" style="background: var(--primary-color); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer;">Loading...</button>
                        <div class="dropdown-content">
                            <a onclick="handleLogout()">Log Out</a>
                        </div>
                    </div>
                </div>

                <button id="theme-toggle">Switch Theme</button>
            </div>
        </nav>
    </header>

    <main id="home">
        <section id="hero">
            <h1>Welcome to Tech House</h1>
            <p>Innovate. Create. Elevate.</p>
        </section>

        <section id="apps">
            <h2>Our Applications</h2>
            <div class="app-grid">
                <a href="tech-house-editor.html" class="app-item"><h3>🎬 Tech House Editor</h3></a>
                <a href="poisoning detector.html" class="app-item"><h3>🍎 Food Poisoning Detector</h3></a>
                <div class="app-item" onclick="alert('Coming Soon!')" style="cursor:pointer"><h3>⭐ T Vision</h3></div>
                <div class="app-item" onclick="alert('Coming Soon!')" style="cursor:pointer"><h3>🎶 Music Producer</h3></div>
            </div>
        </section>
        </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer;" onclick="closeModal()">&times;</span>
            <h2 style="margin-bottom: 20px;">Join Tech House</h2>
            <button class="google-btn" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Continue with Google
            </button>
            <div class="separator"><span>OR</span></div>
            <div id="email-form">
                <div class="name-row">
                    <input type="text" id="fname" placeholder="First Name">
                    <input type="text" id="lname" placeholder="Last Name">
                </div>
                <input type="email" id="email" placeholder="Email">
                <div class="password-container">
                    <input type="password" id="password" placeholder="Password">
                    <button type="button" id="togglePassword" onclick="togglePassView()">Show</button>
                </div>
                <button class="continue-btn" onclick="handleEmailSignUp()">Continue</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script> 
    <script>
        // Modal UI Helpers
        function openModal() { document.getElementById('authModal').style.display = 'block'; }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; }
        function togglePassView() {
            const p = document.getElementById('password');
            const b = document.getElementById('togglePassword');
            p.type = p.type === "password" ? "text" : "password";
            b.innerText = p.type === "password" ? "Show" : "Hide";
        }
    </script>
</body>
</html>
