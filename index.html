<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech House — Innovate. Create. Elevate.</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Techhouse_style.css">
</head>
<body>

  <header>
    <nav>
      <div class="logo">
        <img src="Tech House logo.jpg" alt="Tech House Logo">
      </div>
      <div class="nav-right">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#apps">Apps</a></li>
          <li><a href="#about">About</a></li>
        </ul>

        <!-- AUTH UI AREA -->
        <div id="auth-section">
          <button id="signin-btn">Sign In</button>
          
          <div id="user-profile" style="display: none;">
             <span id="user-greeting">Welcome!</span>
             <button id="logout-btn">Log Out</button>
          </div>
        </div>

        <button id="theme-toggle">Switch Theme</button>
      </div>
    </nav>
  </header>

  <!-- ... (rest of your main content remains the same) ... -->
  <main id="home">
    <section id="hero">
      <h1>Tech House</h1>
      <p>Innovate. Create. Elevate.</p>
    </section>
    <!-- Your Apps and About sections go here -->
  </main>

  <!-- FULL SCREEN AUTH OVERLAY -->
  <div id="authOverlay" class="full-page-overlay">
    <div class="auth-container">
      <button class="close-overlay" id="authCloseBtn">&times;</button>
      
      <div class="auth-card">
        <div class="auth-brand-side">
          <h2>Tech House</h2>
          <p>Join the future of accessible technology.</p>
        </div>

        <div class="auth-form-side">
          <h1>Sign In</h1>
          <p class="subtitle">Google is the fastest way to get started.</p>

          <!-- Google First -->
          <button class="google-login-btn" id="google-signin-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
            Continue with Google
          </button>

          <div class="form-divider"><span>OR EMAIL</span></div>

          <div class="input-group">
            <input type="text" id="fname" placeholder="First Name">
            <input type="text" id="lname" placeholder="Last Name">
          </div>
          <input type="email" id="email" placeholder="Email Address">
          <input type="password" id="password" placeholder="Password (6+ chars)">
          
          <button class="email-signup-btn" id="email-signup-btn">Create Account</button>
          <p class="terms">By signing in, you agree to our terms.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js" type="module"></script>
</body>
</html>
