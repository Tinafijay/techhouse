<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Tech House</title>
  <link rel="stylesheet" href="Techhouse_style.css">
</head>
<body>
  <div class="auth-page-container">
    <div class="brand-side">
      <img src="Tech House logo.jpg" alt="Logo" class="auth-logo">
      <h1>Tech <br> House.</h1>
      <p>Innovate. Create. Elevate.</p>
    </div>
    <div class="form-side">
      <div class="form-inner">
        <h2>Welcome Back</h2>
        <button id="google-signin-btn" class="google-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="">
          Continue with Google
        </button>
        <div style="text-align:center; margin-bottom:20px; color:#888;">OR USE EMAIL</div>
        <div style="display:flex; gap:10px;">
          <input type="text" id="fname" placeholder="First Name">
          <input type="text" id="lname" placeholder="Last Name">
        </div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password (6+ chars)">
        <button id="email-signup-btn" class="btn-main">Create Account</button>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:var(--primary); text-decoration:none; font-weight:bold;">← Back to Home</a>
      </div>
    </div>
  </div>
  <script src="script.js" type="module"></script>
</body>
</html>
