<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tech House Master - V0.1.1 Stable</title>
    <!-- COI Service Worker is MANDATORY for ChromeOS 103 -->
    <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="editor-container">
        <header>
            <h1>🎬 Tech House Editor <small>V0.1.1 Stable</small></h1>
            <div id="status-bar" role="status" class="status-box">Engine Initializing...</div>
        </header>

        <main>
            <div class="upload-section">
                <button class="main-btn" onclick="document.getElementById('vid-in').click()">📁 LOAD VIDEO</button>
                <input type="file" id="vid-in" hidden accept="video/*">
            </div>

            <video id="player" controls></video>
            <div id="time-display" class="time-readout">00:00.00</div>

            <div class="layer-controls">
                <div class="control-box">
                    <label>Add Layer:</label>
                    <select id="layer-type">
                        <option value="logo">🖼️ Permanent Logo (All Time)</option>
                        <option value="temp">🎨 Illustration (Briefly)</option>
                        <option value="bgm">🎵 Background Music</option>
                        <option value="sfx">🔊 Sound Effect (Ding)</option>
                    </select>
                    <button id="browse-btn">Browse File</button>
                    <input type="file" id="file-in" hidden>
                </div>

                <div class="control-box">
                    <label>Export Format:</label>
                    <select id="export-format">
                        <option value="landscape">Horizontal (16:9)</option>
                        <option value="portrait">Vertical (9:16)</option>
                    </select>
                </div>
            </div>

            <div class="asset-grid" id="asset-summary">
                <div id="info-vid">Video: --</div>
                <div id="info-trim">Trim: Whole Video</div>
                <div id="info-layers">Layers: 0</div>
            </div>

            <div id="prog-container" class="hidden">
                <div id="prog-bar"></div>
                <div id="prog-text">Rendering: 0%</div>
            </div>

            <button id="render-btn" class="render-btn" disabled>🚀 EXPORT VIDEO (Ctrl + X)</button>
        </main>

        <div class="help">
            <kbd>S</kbd> Set Start | <kbd>E</kbd> Set End | <kbd>V</kbd> Speak Status | <kbd>Space</kbd> Pause
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
