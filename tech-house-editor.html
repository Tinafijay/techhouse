<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Editor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="editor-container">
    <header>
        <h1>Vibe Editor Pro</h1>
        <div id="announcer" class="sr-only" aria-live="assertive"></div>
        <div id="status-bar" class="status-box">Ready. Upload video to start.</div>
    </header>

    <main>
        <section class="upload-grid">
            <button class="layer-btn" onclick="document.getElementById('vid-up').click()">📁 Video</button>
            <button class="layer-btn" onclick="document.getElementById('img-up').click()">🖼️ Logo/Img</button>
            <button class="layer-btn" onclick="document.getElementById('bgm-up').click()">🎵 Music</button>
            <button class="layer-btn" onclick="document.getElementById('sfx-up').click()">🔊 SFX</button>
            
            <input type="file" id="vid-up" hidden accept="video/*">
            <input type="file" id="img-up" hidden accept="image/*">
            <input type="file" id="bgm-up" hidden accept="audio/*">
            <input type="file" id="sfx-up" hidden accept="audio/*">
        </section>

        <div class="mode-selector-zone">
            <label for="edit-mode"><strong>Current Edit Mode:</strong></label>
            <select id="edit-mode" class="mode-select">
                <option value="trim">Trim (I for Start, O for End)</option>
                <option value="logo">Logo (Ctrl+I to Place, L to Cycle Corner)</option>
                <option value="sfx">SFX (M to Place Ding)</option>
            </select>

            <label for="format-mode"><strong>Export Format:</strong></label>
            <select id="format-mode" class="mode-select">
                <option value="landscape">Landscape (16:9)</option>
                <option value="portrait">Portrait (9:16)</option>
            </select>
        </div>

        <video id="player" controls></video>
        
        <div class="asset-status-panel">
            <div id="stat-vid">Video: None</div>
            <div id="stat-img">Logo: Not Placed</div>
            <div id="stat-pos">Logo Position: Top-Right</div>
        </div>

        <div class="controls-card">
            <label><input type="checkbox" id="denoise-check"> Clean Voice</label>
            <button id="export-btn" class="export-btn" disabled>🚀 RENDER (Ctrl+X)</button>
        </div>

        <div id="progress-container" class="hidden">
            <progress id="render-prog" value="0" max="100" style="width:100%"></progress>
            <p id="prog-text">0% Rendered</p>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
