<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech House Editor Pro - Accessible</title>
    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="editor-card">
        <header>
            <h1>🎬 Tech House Editor <span id="mode-badge">TRIM MODE</span></h1>
            <div id="status-bar" role="status" aria-live="polite" class="status-box">Initializing Engine...</div>
        </header>

        <main>
            <div class="upload-zone">
                <button class="main-btn" onclick="document.getElementById('vid-in').click()">📁 Step 1: Load Video</button>
                <input type="file" id="vid-in" hidden accept="video/*">
            </div>

            <video id="player" controls></video>
            <div id="time-readout" class="time-readout">00:00.00</div>

            <div class="toolbox">
                <div class="tool-group">
                    <label for="track-type">➕ Add Layer</label>
                    <select id="track-type">
                        <option value="img">🖼️ Image Overlay</option>
                        <option value="bgm">🎵 Background Music</option>
                        <option value="sfx">🔊 Sound Effect (Ding)</option>
                    </select>
                    <button onclick="document.getElementById('file-in').click()">Browse</button>
                    <input type="file" id="file-in" hidden>
                </div>

                <div class="tool-group">
                    <label><input type="checkbox" id="cut-mode"> ✂️ CUT MODE (Remove Selection)</label>
                    <p class="hint">Check this to delete the part between S and E markers.</p>
                </div>
            </div>

            <div class="asset-list" id="layers-info">
                <div>Video: <span id="l-vid">None</span></div>
                <div>Overlay: <span id="l-img">None</span></div>
                <div>Audio: <span id="l-aud">None</span></div>
            </div>

            <div id="prog-container" class="hidden">
                <div id="prog-bar"></div>
                <div id="prog-label">0%</div>
            </div>

            <button id="render-btn" class="render-btn" disabled>🚀 RENDER VIDEO (Ctrl + X)</button>
        </main>

        <footer class="shortcuts">
            <p><kbd>S</kbd> Start | <kbd>E</kbd> End | <kbd>V</kbd> Speak Time | <kbd>Space</kbd> Pause</p>
        </footer>
    </div>

    <!-- Load FFmpeg from CDN -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.umd.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <script src="script.js"></script>
</body>
</html>
