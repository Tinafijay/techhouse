<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech House Video Editor</title>
    <!-- MANDATORY: This worker script must be in the same folder as this file -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="editor-container">
        <header>
            <h1>🎬 Tech House Video Editor</h1>
            <div id="status-bar" class="status-box">Status: Initializing...</div>
        </header>

        <main>
            <!-- Step 1: Upload -->
            <div class="upload-zone">
                <button id="main-upload-btn" class="primary-btn">📁 LOAD MAIN VIDEO</button>
                <input type="file" id="vid-uploader" hidden accept="video/*">
            </div>

            <!-- Player -->
            <video id="player" controls playsinline></video>
            <div id="time-display" class="time-readout">00:00.00</div>

            <!-- Toolbox -->
            <div class="toolbox">
                <div class="tool-card">
                    <label for="layer-select">Add Extra Layer:</label>
                    <select id="layer-select">
                        <option value="logo">🖼️ Logo (Stays All Time)</option>
                        <option value="illustration">🎨 Illustration (Brief 3s)</option>
                        <option value="bgm">🎵 Background Music</option>
                        <option value="sfx">🔊 Sound Effect (Ding)</option>
                    </select>
                    <button id="browse-layer-btn">Select File</button>
                    <input type="file" id="layer-uploader" hidden>
                </div>

                <div class="tool-card">
                    <label for="aspect-ratio">Final Shape:</label>
                    <select id="aspect-ratio">
                        <option value="landscape">Landscape (16:9 Cinema)</option>
                        <option value="portrait">Portrait (9:16 TikTok/Reels)</option>
                    </select>
                </div>
            </div>

            <div class="asset-panel">
                <p><strong>Markers:</strong> <span id="lbl-markers">Not Set (Full Video)</span></p>
                <p><strong>Layers:</strong> <span id="lbl-layers">None</span></p>
            </div>

            <!-- Progress -->
            <div id="prog-container" class="hidden">
                <div id="prog-bar"></div>
                <div id="prog-label">Processing: 0%</div>
            </div>

            <button id="export-btn" class="export-btn" disabled>🚀 EXPORT VIDEO (Ctrl + X)</button>
        </main>

        <div class="shortcuts-guide">
            <kbd>S</kbd> Set Start | <kbd>E</kbd> Set End | <kbd>Space</kbd> Play/Pause | <kbd>V</kbd> Speak Status
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
