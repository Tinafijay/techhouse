<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Editor Pro</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="editor-container">
    <header>
        <h1>Vibe Editor Pro</h1>
        <div id="announcer" class="sr-only" aria-live="assertive"></div>
        <div id="status-bar" class="status-box">Ready. Upload your video.</div>
    </header>

    <main>
        <section class="upload-grid">
            <button class="layer-btn" onclick="document.getElementById('vid-up').click()">📁 Video</button>
            <button class="layer-btn" onclick="document.getElementById('img-up').click()">🖼️ Logo</button>
            <button class="layer-btn" onclick="document.getElementById('bgm-up').click()">🎵 Music</button>
            <button class="layer-btn" onclick="document.getElementById('sfx-up').click()">🔊 SFX</button>
            
            <input type="file" id="vid-up" hidden accept="video/*">
            <input type="file" id="img-up" hidden accept="image/*">
            <input type="file" id="bgm-up" hidden accept="audio/*">
            <input type="file" id="sfx-up" hidden accept="audio/*">
        </section>

        <div class="editor-settings">
            <div class="setting-group">
                <label for="edit-mode"><strong>Action Mode:</strong></label>
                <select id="edit-mode" class="mode-select">
                    <option value="trim">Trim (I/O to select area)</option>
                    <option value="logo">Logo (Ctrl+I to place)</option>
                    <option value="sfx">SFX (M to place Ding)</option>
                </select>
            </div>

            <div class="setting-group">
                <label><input type="checkbox" id="trim-check"> ✂️ <strong>Keep Selection Only</strong> (Trim)</label>
                <p class="hint">If unchecked, hitting Backspace deletes the I-O area.</p>
            </div>
        </div>

        <video id="player" controls></video>
        
        <div class="status-panel">
            <div id="stat-vid">Video: None</div>
            <div id="stat-markers">Markers: Not set</div>
            <div id="stat-action">Action: Full Video Export</div>
        </div>

        <div class="render-zone">
            <label><input type="checkbox" id="denoise-check"> Denoise Audio</label>
            <button id="export-btn" class="export-btn" disabled>🚀 RENDER (Ctrl+X)</button>
        </div>

        <div id="progress-container" class="hidden">
            <progress id="render-prog" value="0" max="100"></progress>
            <p id="prog-text">0% Rendered</p>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
